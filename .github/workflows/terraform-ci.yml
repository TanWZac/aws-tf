name: terraform-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env_name: [dev, stage, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (backend disabled)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -lock=false -var-file=environments/${{ matrix.env_name }}/terraform.tfvars -out=${{ matrix.env_name }}.tfplan

      - name: Save plan as text
        run: terraform show -no-color ${{ matrix.env_name }}.tfplan > ${{ matrix.env_name }}.plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.env_name }}
          path: |
            ${{ matrix.env_name }}.tfplan
            ${{ matrix.env_name }}.plan.txt
