name: terraform-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tf_dir:
          - .
          - org
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive --minimum-failure-severity=error

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (backend disabled)
        run: terraform -chdir=${{ matrix.tf_dir }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.tf_dir }} validate
